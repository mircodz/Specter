name: Publish NuGet

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  pack-and-push:
    if: github.actor == 'mircodz'
    environment: publish
    runs-on: ubuntu-latest
    env:
      VERSION_FILE: version
      OUT_DIR: artifacts/nupkg
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Read version
        id: version
        run: echo "VERSION=$(cat $VERSION_FILE)" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack src/Specter/Specter.csproj -c Release -o $OUT_DIR /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet pack src/Specter.Generator/Specter.Generator.csproj -c Release -o $OUT_DIR /p:Version=${{ steps.version.outputs.VERSION }}

      - name: NuGet login
        id: nuget_login
        uses: NuGet/login@v1
        with:
          server: https://api.nuget.org/v3/index.json
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "$OUT_DIR"/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push "$OUT_DIR"/*.nupkg \
            --source "https://nuget.pkg.github.com/${OWNER}/index.json" \
            --api-key "$GITHUB_TOKEN" \
            --skip-duplicate
